// Top-level build file where you can add configuration options common to all sub-projects/modules in your project.

buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:7.0.0"
    }
}

// allprojects block
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}